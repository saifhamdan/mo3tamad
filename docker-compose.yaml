version: '3.8'
services:
  backend:
    image: mo3tamad-backend
    restart: always
    container_name: mo3tamad-backend
    ports:
      - 5000:5000
    networks:
      - mo3tamad
  mysql:
    image: mysql:8.0.19
    container_name: mysql
    command: '--default-authentication-plugin=mysql_native_password'
    restart: always
    #ports:
    #- 3306:3306
    environment:
      MYSQL_DATABASE: mo3tamad
      MYSQL_USER: mo3tamad
      MYSQL_PASSWORD: root@12345
      MYSQL_ROOT_PASSWORD: 'root'
      TZ: 'Asia/Amman'
    volumes:
      - /home/saif/volumes/mo3tamad/mysql_data:/var/lib/mysql
    networks:
      - mo3tamad
  redis:
    image: redis:6-alpine
    container_name: redis
    restart: always
    networks:
      - mo3tamad
    # ports:
    # - '6379:6379'
networks:
  mo3tamad:
    name: mo3tamad
    driver: bridge
